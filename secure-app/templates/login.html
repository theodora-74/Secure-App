{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Welcome back</h2>
        <p class="subtitle">Log in to access the incident management portal.</p>

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Log In</button>
        </form>

        <div class="auth-footer">
            Do not have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
