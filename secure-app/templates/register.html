{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Create an account</h2>
        <p class="subtitle">Register to report and track cybersecurity incidents.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Choose a username" required minlength="3"
                       pattern="[a-zA-Z0-9_]+" title="Letters, digits, and underscores only"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Minimum 8 characters" required minlength="8"
                       autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Repeat your password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
